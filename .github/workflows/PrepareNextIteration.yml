name: Prepare Next Development Iteration

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: The new version (without -SNAPSHOT)
        required: true

jobs:
  Next-Iteration-Job:
    name: Next Iteration Job
    runs-on: github-ubuntu-latest-s
    permissions:
      pull-requests: write
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:

      - name: Checkout Sources
        uses: actions/checkout@v4

      - name: Normalize Version
        id: version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            VERSION="${VERSION}.0"
          fi
          echo "full-version=${VERSION}-SNAPSHOT" >> $GITHUB_OUTPUT


      - name: Update Version Number
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config --global core.autocrlf input
          git config --global core.safecrlf true
          BRANCH="gh-action/next-iteration.${{ github.run_id }}"
          git checkout -b "${BRANCH}"
          mvn versions:set -DgenerateBackupPoms=false -DnewVersion="${{ steps.version.outputs.full-version }}"
          git commit -m 'Prepare next development iteration' -a
          git push --set-upstream origin "${BRANCH}"
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: create-pr
        run: |
          URL=$(gh pr create --draft --base master --title "Prepare next development iteration ${{ steps.version.outputs.full-version }}" --body '')
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "Generated ${{steps.create-pr.outputs.url}}." >> $GITHUB_STEP_SUMMARY
          echo "New version set to ${{ steps.version.outputs.full-version }}." >> $GITHUB_STEP_SUMMARY
          echo "Tip: close and reopen the PR to trigger CI. " >> $GITHUB_STEP_SUMMARY
