name: Prepare Next Development Iteration

on:
  workflow_dispatch:
 
jobs:
  Next-Iteration-Job:
    name: Next Iteration Job
    runs-on: github-ubuntu-latest-s
    permissions:
      statuses: read
      id-token: write
      contents: write
      actions: write
      pull-requests: write

    steps:
      - name: Test
        uses: SonarSource/release-github-actions/update-analyzer@tt/GHA-200_update_plugin
        with:
          release-version: "8.30.0.9999"
          ticket-key: "GHA-200"
          plugin-name: "java"
          # plugin-suffix: ""
          secret-name: ${{ inputs.release-automation-secret-name || format('sonar-{0}-release-automation', inputs.plugin-name) }}
          plugin-artifacts: "java"
          draft: true
          reviewers: ${{ github.actor }}

